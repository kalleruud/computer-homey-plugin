name: Publish Homey App
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - changelogs/**

jobs:
  main:
    name: Publish Homey App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --package-lock=false --legacy-peer-deps --ignore-scripts

      - name: Install Homey build peers
        run: npm install --no-save --legacy-peer-deps @emnapi/core @emnapi/runtime

      - name: Build Homey app manifest
        run: npx homey app build

      - name: Publish Homey App
        id: publish
        env:
          HOMEY_HEADLESS: '1'
          HOMEY_PAT: ${{ secrets.HOMEY_PAT }}
        run: |
          npx homey app publish
          APP_ID="$(node -p "require('./app.json').id")"
          echo "url=https://tools.developer.homey.app/apps/app/${APP_ID}" >> "$GITHUB_OUTPUT"

      - name: URL
        run: |
          echo "Manage your app at ${{ steps.publish.outputs.url }}." >> $GITHUB_STEP_SUMMARY
