name: Publish Homey App

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - changelogs/**

jobs:
  main:
    name: Publish Homey App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Homey changelog
        run: |
          node <<'EOF'
          const fs = require('node:fs');
          const path = require('node:path');

          const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
          const version = app.version;
          const changelogPath = path.join('changelogs', `v${version}.md`);

          if (!fs.existsSync(changelogPath)) {
            throw new Error(`Missing changelog file: ${changelogPath}`);
          }

          const changelogText = fs
            .readFileSync(changelogPath, 'utf8')
            .split(/\r?\n/)
            .map((line) => line.trim())
            .filter((line) => line.length > 0 && !line.startsWith('# '))
            .join('\n');

          if (!changelogText) {
            throw new Error(`Changelog file is empty: ${changelogPath}`);
          }

          fs.writeFileSync(
            '.homeychangelog.json',
            `${JSON.stringify({ [version]: { en: changelogText } }, null, 2)}\n`,
          );
          EOF

      - name: Publish Homey App
        id: publish
        env:
          HOMEY_HEADLESS: '1'
          HOMEY_PAT: ${{ secrets.HOMEY_PAT }}
        run: |
          npx homey app publish
          APP_ID="$(node -p "require('./app.json').id")"
          echo "url=https://tools.developer.homey.app/apps/app/${APP_ID}" >> "$GITHUB_OUTPUT"

      - name: URL
        run: |
          echo "Manage your app at ${{ steps.publish.outputs.url }}." >> $GITHUB_STEP_SUMMARY
