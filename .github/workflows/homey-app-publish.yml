name: Publish Homey App
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - changelogs/**

jobs:
  main:
    name: Publish Homey App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --package-lock=false --legacy-peer-deps --ignore-scripts

      - name: Install Homey build peers
        run: npm install --no-save --legacy-peer-deps @emnapi/core @emnapi/runtime

      - name: Build Homey app manifest
        run: npx homey app build

      - name: Publish Homey App
        uses: athombv/github-action-homey-app-publish@master
        id: publish
        with:
          personal_access_token: ${{ secrets.HOMEY_PAT }}

      - name: URL
        run: |
          echo "Manage your app at ${{ steps.publish.outputs.url }}." >> $GITHUB_STEP_SUMMARY
