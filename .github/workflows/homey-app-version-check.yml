name: Check Homey App Version

on:
  pull_request:
    branches:
      - main

jobs:
  main:
    name: Check Homey App Version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2

      - name: Extract version from PR branch
        id: pr_version
        env:
          PR_BRANCH: ${{ github.head_ref }}
        run: bun scripts/get-release-version.ts

      - name: Verify app versions match PR branch
        env:
          EXPECTED_VERSION: ${{ steps.pr_version.outputs.version }}
        run: bun scripts/check-homey-version-files.ts

      - name: Verify changelog entry exists
        env:
          CHANGELOG_VERSION: ${{ steps.pr_version.outputs.version }}
        run: bun scripts/check-homey-changelog.ts
