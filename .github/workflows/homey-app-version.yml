name: Update Homey App Version
on:
  workflow_dispatch:
    inputs:
      version:
        type: choice
        description: Version
        required: true
        default: patch
        options:
          - major
          - minor
          - patch
      changelog:
        type: string
        description: Changelog
        required: true
  push:
    branches:
      - release/*

# Needed in order to push the commit and create a release
permissions:
  contents: write

jobs:
  main:
    name: Update Homey App Version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version and changelog
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_CHANGELOG: ${{ inputs.changelog }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            VERSION="$INPUT_VERSION"
            CHANGELOG="$INPUT_CHANGELOG"
          else
            if [[ "$GITHUB_REF_NAME" =~ ^release/([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
              VERSION="${BASH_REMATCH[1]}"
            else
              echo "Release branch must match release/x.y.z" >&2
              exit 1
            fi

            CHANGELOG_FILE="changelogs/v${VERSION}.md"

            if [[ ! -f "$CHANGELOG_FILE" ]]; then
              echo "Missing changelog file: $CHANGELOG_FILE" >&2
              exit 1
            fi

            CHANGELOG="$(<"$CHANGELOG_FILE")"
          fi

          {
            echo "version=$VERSION"
            echo "changelog<<EOF"
            printf '%s\n' "$CHANGELOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Inspect current release state
        id: state
        env:
          TARGET_VERSION: ${{ steps.release.outputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          CURRENT_VERSION="$(node -p "require('./package.json').version")"

          if [[ "$CURRENT_VERSION" == "$TARGET_VERSION" ]]; then
            echo "needs_version_update=false" >> "$GITHUB_OUTPUT"
          else
            echo "needs_version_update=true" >> "$GITHUB_OUTPUT"
          fi

          if git rev-parse "v$TARGET_VERSION" >/dev/null 2>&1; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

          if gh release view "v$TARGET_VERSION" >/dev/null 2>&1; then
            echo "release_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update Homey App Version
        uses: athombv/github-action-homey-app-version@master
        id: update_app_version
        if: steps.state.outputs.needs_version_update == 'true'
        with:
          version: ${{ steps.release.outputs.version }}
          changelog: ${{ steps.release.outputs.changelog }}

      - name: Commit & Push
        if: steps.state.outputs.needs_version_update == 'true'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi

          git commit -m "Update Homey App Version to v${{ steps.release.outputs.version }}"
          git push origin HEAD:${GITHUB_REF_NAME}

      - name: Create tag
        if: steps.state.outputs.tag_exists != 'true'
        run: |
          git tag "v${{ steps.release.outputs.version }}"
          git push origin "v${{ steps.release.outputs.version }}"

      - name: Create GitHub release
        if: steps.state.outputs.release_exists != 'true'
        run: |
          gh release create "v${{ steps.release.outputs.version }}" -t "v${{ steps.release.outputs.version }}" --notes "" --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ github.token }}
