name: Update Homey App Version
on:
  pull_request:
    branches:
      - main
    types:
      - closed

# Needed in order to push the commit and create a release
permissions:
  contents: write

jobs:
  main:
    name: Update Homey App Version
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Resolve release version and changelog
        id: release
        env:
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          if [[ "$PR_BRANCH" =~ ^release/([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
          else
            echo "Release branch must match release/x.y.z" >&2
            exit 1
          fi

          CHANGELOG_FILE="changelogs/v${VERSION}.md"

          if [[ ! -f "$CHANGELOG_FILE" ]]; then
            echo "Missing changelog file: $CHANGELOG_FILE" >&2
            exit 1
          fi

          CHANGELOG="$(<"$CHANGELOG_FILE")"
          echo "version_input=$VERSION" >> "$GITHUB_OUTPUT"
          echo "exact_version=$VERSION" >> "$GITHUB_OUTPUT"

          {
            echo "changelog<<EOF"
            printf '%s\n' "$CHANGELOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Inspect current release state
        id: state
        run: |
          TARGET_VERSION="${{ steps.release.outputs.exact_version }}"
          CURRENT_VERSION="$(node -p "require('./package.json').version")"

          if [[ "$CURRENT_VERSION" == "$TARGET_VERSION" ]]; then
            echo "needs_version_update=false" >> "$GITHUB_OUTPUT"
          else
            echo "needs_version_update=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update Homey App Version
        uses: athombv/github-action-homey-app-version@master
        id: update_app_version
        if: steps.state.outputs.needs_version_update == 'true'
        with:
          version: ${{ steps.release.outputs.version_input }}
          changelog: ${{ steps.release.outputs.changelog }}

      - name: Resolve final version
        id: final_version
        run: |
          VERSION="${{ steps.update_app_version.outputs.version }}"

          if [[ -z "$VERSION" ]]; then
            VERSION="${{ steps.release.outputs.exact_version }}"
          fi

          if [[ -z "$VERSION" ]]; then
            echo "Unable to determine final version" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit & Push
        if: steps.state.outputs.needs_version_update == 'true'
        env:
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi

          git commit -m "Update Homey App Version to v${{ steps.final_version.outputs.version }}"
          git push origin HEAD:${BASE_BRANCH}

      - name: Inspect publication state
        id: publish_state
        env:
          TARGET_VERSION: ${{ steps.final_version.outputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if git rev-parse "v$TARGET_VERSION" >/dev/null 2>&1; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

          if gh release view "v$TARGET_VERSION" >/dev/null 2>&1; then
            echo "release_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag
        if: steps.publish_state.outputs.tag_exists != 'true'
        run: |
          git tag "v${{ steps.final_version.outputs.version }}"
          git push origin "v${{ steps.final_version.outputs.version }}"

      - name: Create GitHub release
        if: steps.publish_state.outputs.release_exists != 'true'
        run: |
          gh release create "v${{ steps.final_version.outputs.version }}" -t "v${{ steps.final_version.outputs.version }}" --notes "" --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ github.token }}
