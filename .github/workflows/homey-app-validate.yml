name: Validate Homey App
on:
  pull_request:
    branches:
      - main

jobs:
  main:
    name: Validate Homey App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --package-lock=false --legacy-peer-deps --ignore-scripts

      - name: Validate Homey App
        run: npx homey app validate --level verified
