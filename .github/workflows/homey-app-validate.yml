name: Validate Homey App
on:
  pull_request:
    branches:
      - main

jobs:
  metadata:
    name: Validate Release Metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from PR branch
        id: pr_version
        env:
          PR_BRANCH: ${{ github.head_ref }}
        run: |
          if [[ "$PR_BRANCH" =~ ^releae/([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "PR branch must match releae/x.y.z" >&2
          exit 1

      - name: Verify package version matches PR branch
        env:
          EXPECTED_VERSION: ${{ steps.pr_version.outputs.version }}
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if [[ "$PACKAGE_VERSION" == "$EXPECTED_VERSION" ]]; then
            exit 0
          fi

          echo "PR branch version $EXPECTED_VERSION does not match package.json version $PACKAGE_VERSION" >&2
          exit 1

      - name: Verify changelog file exists
        env:
          CHANGELOG_VERSION: ${{ steps.pr_version.outputs.version }}
        run: |
          CHANGELOG_FILE="changelogs/v${CHANGELOG_VERSION}.md"

          if [[ -f "$CHANGELOG_FILE" ]]; then
            exit 0
          fi

          echo "Missing changelog file: $CHANGELOG_FILE" >&2
          exit 1

  main:
    name: Validate Homey App
    runs-on: ubuntu-latest
    needs: metadata
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate Homey App
        run: bunx homey app validate --level verified
